    :root {
      --city-blue: #003b8f;
      --city-blue-2: #0d5ab7;
      --city-blue-3: #dfeaf8;
      --city-gold: #f4b544;
      --city-ink: #1b2b45;
      --city-soft: #f6f9fd;
      --city-line: rgba(0, 59, 143, 0.12);
      --city-shadow: 0 14px 36px rgba(10, 33, 79, 0.12);
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--city-ink);
      background:

        linear-gradient(180deg, #f9fbff 0%, #eef4fb 100%);
    }

    .wrap {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(0,59,143,0.96), rgba(13,90,183,0.96));
      color: #fff;
      border-radius: 28px;
      padding: 28px 28px 24px;
      box-shadow: var(--city-shadow);
      position: relative;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      pointer-events: none;
    }
    .hero::before { width: 280px; height: 280px; right: -60px; top: -120px; }
    .hero::after { width: 180px; height: 180px; right: 180px; bottom: -90px; }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }
    .hero p {
      max-width: 880px;
      margin: 12px 0 0;
      line-height: 1.75;
      color: rgba(255,255,255,0.92);
      position: relative;
      z-index: 1;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }
    .stat {
      min-width: 132px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .stat span {
      font-size: 13px;
      color: rgba(255,255,255,0.88);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--city-line);
      border-radius: var(--radius-xl);
      box-shadow: var(--city-shadow);
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--city-line);
      background: linear-gradient(180deg, rgba(0,59,143,0.04), transparent);
    }
    .panel-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--city-blue);
    }
    .panel-sub {
      font-size: 13px;
      color: #5f708b;
      margin-top: 4px;
    }

    #map {
      width: 100%;
      height: 760px;
      background: linear-gradient(180deg, #dcecff 0%, #eef5fd 100%);
    }

    .leaflet-container {
      font: inherit;
    }

    .leaflet-control-attribution {
      font-size: 11px;
      background: rgba(255,255,255,0.85);
    }

    .play-marker {
      position: relative;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff 2px, var(--city-gold) 3px, #f1a320 55%, #dc8a00 100%);
      border: 3px solid #fff;
      box-shadow: 0 6px 16px rgba(0, 59, 143, 0.28);
    }
    .play-marker::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: rgba(244, 181, 68, 0.22);
      animation: pulse 2.2s infinite ease-out;
      z-index: -1;
    }
    .play-marker.cluster {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: var(--city-blue);
      background: radial-gradient(circle at 30% 30%, #fff 5%, #ffe6ac 15%, #ffd170 58%, #f1a320 100%);
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.9; }
      70% { transform: scale(1.1); opacity: 0; }
      100% { transform: scale(1.1); opacity: 0; }
    }

    .popup-card {
      min-width: 250px;
      max-width: 290px;
    }
    .popup-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      margin-bottom: 10px;
    }
    .popup-card h3 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.35;
      color: var(--city-blue);
    }
    .popup-meta {
      font-size: 13px;
      color: #5c6a81;
      margin-bottom: 8px;
    }
    .popup-desc {
      font-size: 14px;
      line-height: 1.65;
      color: #253752;
    }
    .badge-row,
    .tag-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge,
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.2;
      border: 1px solid rgba(0,59,143,0.1);
      background: #f3f7fd;
      color: var(--city-blue);
    }
    .tag.active {
      background: linear-gradient(135deg, rgba(0,59,143,0.96), rgba(13,90,183,0.92));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(13, 90, 183, 0.22);
    }

    .side {
      padding: 18px;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search {
      position: relative;
    }
    .search input {
      width: 100%;
      border: 1px solid var(--city-line);
      background: #fff;
      color: var(--city-ink);
      border-radius: 14px;
      padding: 12px 14px 12px 42px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .search input:focus {
      border-color: rgba(13,90,183,0.5);
      box-shadow: 0 0 0 4px rgba(13,90,183,0.10);
    }
    .search::before {
      content: "⌕";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7c95;
      font-size: 20px;
      line-height: 1;
    }

    .tag-grid {
      margin-bottom: 10px;
    }

    .detail-card {
      border: 1px solid var(--city-line);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: 0 10px 22px rgba(10, 33, 79, 0.06);
      margin-bottom: 16px;
    }
    .detail-media {
      position: relative;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #d6e7ff, #f7fbff);
      overflow: hidden;
    }
    .detail-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-body {
      padding: 16px;
    }
    .detail-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
      color: var(--city-blue);
    }
    .detail-location {
      font-size: 14px;
      color: #5c6a81;
      margin: 8px 0 14px;
    }
    .detail-desc {
      font-size: 15px;
      line-height: 1.8;
      color: #22344d;
      margin: 14px 0 0;
    }
    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;

    .btn-link.secondary {

      color: var(--city-blue);
      border: 1px solid rgba(0,59,143,0.12);

  display: none;
}
    .item {

      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .item:hover,
    .item.is-active {
      transform: translateY(-1px);
      border-color: rgba(13,90,183,0.35);
      box-shadow: 0 10px 20px rgba(10,33,79,0.08);
    }
    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .item h4 {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
      color: var(--city-blue);
    }
    .item small {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #6b7c95;
    }
    .mini-badge {
      flex: 0 0 auto;
      min-width: 58px;
      text-align: center;
      padding: 7px 8px;
      border-radius: 12px;
      background: #f3f7fd;
      color: var(--city-blue);
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(0,59,143,0.08);

    .item p {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.7;
      color: #2f4058;
    }

    .footnote {
      font-size: 12px;
      line-height: 1.7;
      color: #6a7a91;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed rgba(0,59,143,0.14);

    .placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      background:

      color: var(--city-blue);
      font-weight: 800;
      letter-spacing: 0.03em;
      text-align: center;
      padding: 14px;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
      #map { height: 600px; }
      .list { max-height: none; }
    }

    @media (max-width: 640px) {
      .wrap { width: min(100% - 20px, 1440px); padding-top: 18px; }
      .hero { padding: 22px 18px 20px; border-radius: 22px; }
      .panel-head { padding: 16px 16px 12px; }
      .side { padding: 16px; }
      #map { height: 520px; }
      .detail-title { font-size: 21px; }
    }
  </style>
</head>

    const allTags = [...new Set(playgrounds.flatMap(item => item.tags))];
    document.getElementById('statParks').textContent = playgrounds.length;
    document.getElementById('statTags').textContent = allTags.length;

    const map = L.map('map', {
      zoomControl: true,
      scrollWheelZoom: true,
      minZoom: 6,
      maxZoom: 12,
      dragging: true,
      tap: true
    }).setView([23.75, 120.9], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: ''
    }).addTo(map);

    const markers = new Map();
    const listEl = document.getElementById('list');
    const detailEl = document.getElementById('detailCard');
    const tagWrap = document.getElementById('tagFilters');
    const searchInput = document.getElementById('searchInput');
    let activeTag = '全部';
    let activeId = playgrounds[0].id;

    function fallbackSVG(name) {
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop stop-color="#d8e8ff" offset="0%"/>
              <stop stop-color="#fff3d0" offset="100%"/>
            </linearGradient>
          </defs>
          <rect width="1200" height="675" fill="url(#g)" rx="28"/>
          <g fill="none" stroke="#003b8f" stroke-opacity=".14">
            <circle cx="170" cy="130" r="90"/>
            <circle cx="1010" cy="520" r="120"/>
            <path d="M120 500 C 230 430, 360 550, 470 490 S 740 420, 890 470 S 1010 530, 1120 480" stroke-width="7"/>
          </g>
          <g transform="translate(160 220)">
            <rect x="0" y="0" width="880" height="200" rx="30" fill="#ffffff" fill-opacity=".68" stroke="#003b8f" stroke-opacity=".08"/>
            <text x="440" y="78" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="34" font-weight="700" fill="#003b8f">${name}</text>
            <text x="440" y="132" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="20" fill="#355079">圖片可替換為媒體庫或授權圖檔</text>
          </g>
        </svg>
      `)}`;
    }

    function makeMarker(count = 1) {
      const clusterClass = count > 1 ? ' cluster' : '';
      const html = `<div class="play-marker${clusterClass}">${count > 1 ? count : ''}</div>`;
      return L.divIcon({
        html,
        className: 'play-div-icon',
        iconSize: count > 1 ? [34, 34] : [22, 22],
        iconAnchor: count > 1 ? [17, 17] : [11, 11],
        popupAnchor: [0, -12]
      });
    }

    function popupHtml(item) {
      const image = item.image || fallbackSVG(item.name);
      return `
        <div class="popup-card">
          <img src="${image}" alt="${item.name}" onerror="this.onerror=null;this.src='${fallbackSVG(item.name)}';" />
          <h3>${item.name}</h3>
          <div class="popup-meta">${item.city}・${item.district}</div>
          <div class="badge-row">${item.tags.map(tag => `<span class="badge">${tag}</span>`).join('')}</div>
          <div class="popup-desc">${item.description}</div>
        </div>
      `;
    }

    function renderFilters() {
      const tags = ['全部', ...allTags];
      tagWrap.innerHTML = tags.map(tag => {
  const cleanTag = tag.replace(/（.*?）/g, ''); // 👈 移除括號
  return `
    <button class="tag ${tag === activeTag ? 'active' : ''}" data-tag="${tag}" type="button">
      ${cleanTag}
    </button>
  `;
}).join('');
      tagWrap.querySelectorAll('[data-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTag = btn.dataset.tag;
          renderFilters();
          renderList();
          updateMarkers();
        });
      });
    }

    function filteredData() {
      const keyword = searchInput.value.trim().toLowerCase();
      return playgrounds.filter(item => {
        const tagMatch = activeTag === '全部' || item.tags.includes(activeTag);
        const text = [item.name, item.city, item.district, item.address, item.description, ...item.tags].join(' ').toLowerCase();
        const keywordMatch = !keyword || text.includes(keyword);
        return tagMatch && keywordMatch;
      });
    }

    function renderDetail(item) {
      if (!item) {
        detailEl.innerHTML = '<div class="detail-body"><p>查無資料。</p></div>';
        return;
      }
      const image = item.image || fallbackSVG(item.name);
      detailEl.innerHTML = `
        <div class="detail-media">
          <img src="${image}" alt="${item.name}" onerror="this.onerror=null;this.src='${fallbackSVG(item.name)}';" />
        </div>
        <div class="detail-body">
          <div class="badge-row">${item.tags.map(tag => `<span class="badge">${tag}</span>`).join('')}</div>
          <h2 class="detail-title">${item.name}</h2>
          <div class="detail-location">${item.city}・${item.district}${item.address ? `・${item.address}` : ''}</div>
          <p class="detail-desc">${item.description}</p>
          <div class="detail-links">
            <a class="btn-link primary" href="${item.source}" target="_blank" rel="noopener noreferrer">看更多介紹</a>
            <a class="btn-link secondary" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name + ' ' + item.city + ' ' + item.address)}" target="_blank" rel="noopener noreferrer">打開地圖</a>
          </div>
        </div>
      `;
    }

    function renderList() {
      const data = filteredData();
      if (!data.length) {
        listEl.innerHTML = '<div class="item"><h4>找不到符合條件的遊戲場</h4><p>請調整關鍵字或切換指標標籤。</p></div>';
        detailEl.innerHTML = '<div class="detail-body"><h3 class="detail-title">目前沒有符合條件的結果</h3></div>';
        return;
      }

      if (!data.some(item => item.id === activeId)) {
        activeId = data[0].id;
      }

      listEl.innerHTML = data.map(item => `
        <article class="item ${item.id === activeId ? 'is-active' : ''}" data-id="${item.id}" tabindex="0" role="button" aria-label="查看 ${item.name}">
          <div class="item-top">
            <div>
              <h4>${item.name}</h4>
              <small>${item.city}・${item.district}</small>
            </div>
            <span class="mini-badge">${item.tags.length} 指標</span>
          </div>
          <div class="badge-row" style="margin-top:10px;">${item.tags.map(tag => `<span class="badge">${tag}</span>`).join('')}</div>
          <p>${item.description}</p>
        </article>
      `).join('');

      const current = data.find(item => item.id === activeId) || data[0];
      renderDetail(current);

      listEl.querySelectorAll('.item').forEach(el => {
        const activate = () => focusItem(el.dataset.id, true);
        el.addEventListener('click', activate);
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            activate();
          }
        });
      });
    }

    function focusItem(id, pan = false) {
      activeId = id;
      const item = playgrounds.find(p => p.id === id);
      renderList();
      if (item && markers.has(id)) {
        const marker = markers.get(id);
        marker.openPopup();
        if (pan) {
          map.flyTo([item.lat, item.lng], Math.max(map.getZoom(), 8), { duration: 0.6 });
        }
      }
    }

    function updateMarkers() {
      const visibleIds = new Set(filteredData().map(item => item.id));
      markers.forEach((marker, id) => {
        if (visibleIds.has(id)) {
          if (!map.hasLayer(marker)) marker.addTo(map);
        } else if (map.hasLayer(marker)) {
          map.removeLayer(marker);
        }
      });
    }

    playgrounds.forEach(item => {
      const marker = L.marker([item.lat, item.lng], { icon: makeMarker(item.tags.length) })
        .bindPopup(popupHtml(item), { maxWidth: 320, className: 'city-popup' })
        .addTo(map);

      marker.on('click', () => {
        activeId = item.id;
        renderList();
      });
      markers.set(item.id, marker);
    });

    searchInput.addEventListener('input', () => {
      renderList();
      updateMarkers();
    });

    renderFilters();
    renderList();
    updateMarkers();

    // 首次預設開啟第一筆。
    setTimeout(() => {
      const first = playgrounds.find(item => item.id === activeId);
      if (first && markers.has(first.id)) {
        markers.get(first.id).openPopup();
      }
    }, 300);
  </script>
</body>
</html>
